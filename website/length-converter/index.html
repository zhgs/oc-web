<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📏 长度单位换算器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        header h1 {
            font-size: 2em;
            color: #333;
            margin-bottom: 8px;
        }
        header p {
            color: #888;
            font-size: 0.95em;
        }

        /* 输入区 */
        .input-section {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            align-items: stretch;
        }
        .input-section input {
            flex: 1;
            font-size: 1.4em;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 12px;
            outline: none;
            transition: border-color .2s;
        }
        .input-section input:focus { border-color: #667eea; }
        .input-section select {
            font-size: 1.1em;
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 12px;
            background: #f9f9ff;
            cursor: pointer;
            outline: none;
            min-width: 100px;
        }
        .input-section select:focus { border-color: #667eea; }

        /* 结果区 */
        .results {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 28px;
        }
        .result-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            border-radius: 14px;
            padding: 18px;
            text-align: center;
            transition: transform .2s, box-shadow .2s;
            cursor: default;
        }
        .result-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        .result-card.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .result-card.active .unit-label,
        .result-card.active .unit-value { color: #fff; }
        .unit-label {
            font-size: 0.85em;
            color: #888;
            margin-bottom: 6px;
            font-weight: 600;
        }
        .unit-value {
            font-size: 1.3em;
            color: #333;
            font-weight: 700;
            word-break: break-all;
        }

        /* 换算关系图 */
        .relation-section {
            background: #f8f9ff;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 24px;
        }
        .relation-section h3 {
            font-size: 1em;
            color: #555;
            margin-bottom: 14px;
            text-align: center;
        }
        .relation-chain {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        .rel-unit {
            background: #667eea;
            color: #fff;
            padding: 8px 14px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9em;
        }
        .rel-arrow {
            color: #aaa;
            font-size: 0.8em;
            text-align: center;
            line-height: 1.2;
        }

        /* 练习模式 */
        .quiz-section {
            border-top: 2px dashed #e0e0e0;
            padding-top: 24px;
        }
        .quiz-section h3 {
            font-size: 1.1em;
            color: #333;
            margin-bottom: 14px;
            text-align: center;
        }
        .quiz-box {
            background: #fffbe6;
            border: 2px solid #ffe066;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            margin-bottom: 14px;
        }
        .quiz-question {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 14px;
            font-weight: 600;
        }
        .quiz-input-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        .quiz-input-row input {
            font-size: 1.2em;
            padding: 10px 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 160px;
            text-align: center;
            outline: none;
        }
        .quiz-input-row input:focus { border-color: #667eea; }
        .quiz-input-row span { font-size: 1.1em; color: #555; font-weight: 600; }
        .btn {
            display: inline-block;
            padding: 10px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-secondary {
            background: #f0f0f0;
            color: #555;
            margin-left: 8px;
        }
        .btn-secondary:hover { background: #e0e0e0; }
        .quiz-buttons { margin-top: 14px; }
        .quiz-feedback {
            margin-top: 12px;
            font-size: 1em;
            font-weight: 600;
            min-height: 1.4em;
        }
        .correct { color: #27ae60; }
        .wrong { color: #e74c3c; }

        /* 得分 */
        .score-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 14px;
            font-size: 0.95em;
            color: #666;
        }
        .score-bar span { font-weight: 700; }

        /* 返回按钮 */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }

        @media (max-width: 500px) {
            .container { padding: 24px 16px; }
            .input-section { flex-direction: column; }
            .results { grid-template-columns: 1fr; }
            header h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📏 长度单位换算器</h1>
            <p>厘米、米、毫米、千米自由换算，掌握换算逻辑</p>
        </header>

        <!-- 换算器 -->
        <div class="input-section">
            <input type="number" id="inputValue" placeholder="输入数值" value="1" step="any">
            <select id="inputUnit">
                <option value="km">千米 (km)</option>
                <option value="m" selected>米 (m)</option>
                <option value="cm">厘米 (cm)</option>
                <option value="mm">毫米 (mm)</option>
            </select>
        </div>

        <div class="results" id="results">
            <div class="result-card" id="card-km">
                <div class="unit-label">千米 (km)</div>
                <div class="unit-value" id="val-km">0.001</div>
            </div>
            <div class="result-card active" id="card-m">
                <div class="unit-label">米 (m)</div>
                <div class="unit-value" id="val-m">1</div>
            </div>
            <div class="result-card" id="card-cm">
                <div class="unit-label">厘米 (cm)</div>
                <div class="unit-value" id="val-cm">100</div>
            </div>
            <div class="result-card" id="card-mm">
                <div class="unit-label">毫米 (mm)</div>
                <div class="unit-value" id="val-mm">1000</div>
            </div>
        </div>

        <!-- 换算关系图 -->
        <div class="relation-section">
            <h3>📐 换算关系</h3>
            <div class="relation-chain">
                <div class="rel-unit">1 千米</div>
                <div class="rel-arrow">×1000<br>⇄<br>÷1000</div>
                <div class="rel-unit">1000 米</div>
                <div class="rel-arrow">×100<br>⇄<br>÷100</div>
                <div class="rel-unit">100000 厘米</div>
                <div class="rel-arrow">×10<br>⇄<br>÷10</div>
                <div class="rel-unit">1000000 毫米</div>
            </div>
        </div>

        <!-- 练习模式 -->
        <div class="quiz-section">
            <h3>🎯 换算练习</h3>
            <div class="quiz-box">
                <div class="quiz-question" id="quizQuestion">加载中…</div>
                <div class="quiz-input-row">
                    <input type="number" id="quizAnswer" placeholder="你的答案" step="any">
                    <span id="quizTargetUnit"></span>
                </div>
                <div class="quiz-buttons">
                    <button class="btn btn-primary" onclick="checkAnswer()">✅ 提交</button>
                    <button class="btn btn-secondary" onclick="newQuiz()">🔄 换一题</button>
                </div>
                <div class="quiz-feedback" id="quizFeedback"></div>
            </div>
            <div class="score-bar">
                <div>✅ 正确: <span id="scoreCorrect">0</span></div>
                <div>❌ 错误: <span id="scoreWrong">0</span></div>
                <div>🏆 连对: <span id="scoreStreak">0</span></div>
            </div>
        </div>

        <a href="../index.html" class="back-link">← 返回导航中心</a>
    </div>

    <script>
        // ===== 换算逻辑 =====
        const units = ['km', 'm', 'cm', 'mm'];
        // 所有单位转为米的倍数
        const toMeter = { km: 1000, m: 1, cm: 0.01, mm: 0.001 };
        const unitNames = { km: '千米', m: '米', cm: '厘米', mm: '毫米' };

        const inputValue = document.getElementById('inputValue');
        const inputUnit = document.getElementById('inputUnit');

        function convert() {
            const val = parseFloat(inputValue.value);
            const from = inputUnit.value;
            if (isNaN(val)) {
                units.forEach(u => document.getElementById('val-' + u).textContent = '—');
                return;
            }
            const meters = val * toMeter[from];
            units.forEach(u => {
                const result = meters / toMeter[u];
                // 智能格式化：避免浮点精度问题
                let display;
                if (Number.isInteger(result) || Math.abs(result) >= 1e10) {
                    display = result.toLocaleString('zh-CN');
                } else {
                    display = parseFloat(result.toPrecision(12)).toString();
                }
                document.getElementById('val-' + u).textContent = display;

                const card = document.getElementById('card-' + u);
                if (u === from) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
        }

        inputValue.addEventListener('input', convert);
        inputUnit.addEventListener('change', convert);
        convert();

        // ===== 练习模式 =====
        let score = { correct: 0, wrong: 0, streak: 0 };
        let currentQuiz = null;

        // 换算对：[from, to, factor]  factor = from → to 的倍数
        const quizPairs = [
            ['m', 'cm', 100],
            ['cm', 'm', 0.01],
            ['m', 'mm', 1000],
            ['mm', 'm', 0.001],
            ['km', 'm', 1000],
            ['m', 'km', 0.001],
            ['cm', 'mm', 10],
            ['mm', 'cm', 0.1],
            ['km', 'cm', 100000],
            ['km', 'mm', 1000000],
        ];

        function newQuiz() {
            document.getElementById('quizFeedback').textContent = '';
            document.getElementById('quizAnswer').value = '';
            const pair = quizPairs[Math.floor(Math.random() * quizPairs.length)];
            // 生成"好看"的数值
            let val;
            if (pair[2] >= 1) {
                // 大单位→小单位，给个整数
                val = [1, 2, 3, 5, 10, 15, 20, 25, 50, 100][Math.floor(Math.random() * 10)];
            } else {
                // 小单位→大单位，给个能整除的数
                const divisor = Math.round(1 / pair[2]);
                const mult = [1, 2, 3, 5, 10][Math.floor(Math.random() * 5)];
                val = divisor * mult;
            }
            const answer = val * pair[2];
            currentQuiz = { val, from: pair[0], to: pair[1], answer };
            document.getElementById('quizQuestion').textContent =
                `${val} ${unitNames[pair[0]]} = ? ${unitNames[pair[1]]}`;
            document.getElementById('quizTargetUnit').textContent = unitNames[pair[1]];
            document.getElementById('quizAnswer').focus();
        }

        function checkAnswer() {
            if (!currentQuiz) return;
            const userAns = parseFloat(document.getElementById('quizAnswer').value);
            const fb = document.getElementById('quizFeedback');
            if (isNaN(userAns)) {
                fb.textContent = '请输入数字哦～';
                fb.className = 'quiz-feedback wrong';
                return;
            }
            // 允许浮点误差
            const correct = Math.abs(userAns - currentQuiz.answer) < 1e-6 ||
                Math.abs(userAns - currentQuiz.answer) / Math.max(Math.abs(currentQuiz.answer), 1e-9) < 1e-6;
            if (correct) {
                fb.textContent = '🎉 正确！太棒了！';
                fb.className = 'quiz-feedback correct';
                score.correct++;
                score.streak++;
            } else {
                fb.innerHTML = `❌ 不对哦，正确答案是 <b>${currentQuiz.answer}</b> ${unitNames[currentQuiz.to]}`;
                fb.className = 'quiz-feedback wrong';
                score.wrong++;
                score.streak = 0;
            }
            document.getElementById('scoreCorrect').textContent = score.correct;
            document.getElementById('scoreWrong').textContent = score.wrong;
            document.getElementById('scoreStreak').textContent = score.streak;
            // 1.5秒后自动下一题
            setTimeout(newQuiz, 1800);
        }

        // 回车提交
        document.getElementById('quizAnswer').addEventListener('keydown', e => {
            if (e.key === 'Enter') checkAnswer();
        });

        newQuiz();
    </script>
</body>
</html>
