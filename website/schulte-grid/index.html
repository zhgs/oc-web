<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>舒尔特方格 - 专注力训练</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f4f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #2d3a2d;
        }

        /* 顶部导航 */
        .top-bar {
            width: 100%;
            background: #e8efe8;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #d0dcd0;
        }
        .top-bar a {
            color: #4a7c59;
            text-decoration: none;
            font-size: 0.95em;
        }
        .top-bar a:hover { text-decoration: underline; }

        /* 主容器 */
        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px 0 10px;
        }
        header h1 {
            font-size: 1.8em;
            color: #3a5a3a;
        }
        header p {
            color: #6a8a6a;
            margin-top: 6px;
            font-size: 0.95em;
        }

        /* 控制栏 */
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        .size-btn {
            padding: 8px 20px;
            border: 2px solid #b0ccb0;
            border-radius: 20px;
            background: #fff;
            color: #3a5a3a;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .size-btn:hover { background: #e0f0e0; }
        .size-btn.active {
            background: #4a7c59;
            color: #fff;
            border-color: #4a7c59;
        }

        /* 状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #fff;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .timer {
            font-size: 1.6em;
            font-weight: 700;
            color: #3a5a3a;
            font-variant-numeric: tabular-nums;
        }
        .next-num {
            font-size: 1.1em;
            color: #6a8a6a;
        }
        .next-num span {
            font-weight: 700;
            color: #4a7c59;
            font-size: 1.3em;
        }

        /* 方格区域 */
        .grid-wrapper {
            display: flex;
            justify-content: center;
        }
        .grid {
            display: grid;
            gap: 4px;
            user-select: none;
        }
        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            border: 2px solid #c8dcc8;
            border-radius: 8px;
            font-size: 1.4em;
            font-weight: 700;
            color: #3a5a3a;
            cursor: pointer;
            transition: all 0.15s;
            aspect-ratio: 1;
        }
        .cell:hover { background: #e8f5e8; border-color: #4a7c59; }
        .cell:active { transform: scale(0.95); }
        .cell.correct {
            background: #4a7c59;
            color: #fff;
            border-color: #4a7c59;
            cursor: default;
            animation: pop 0.2s ease;
        }
        .cell.wrong {
            animation: shake 0.3s ease;
            border-color: #c0392b;
            background: #fde8e8;
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        /* 完成提示 */
        .result {
            display: none;
            text-align: center;
            padding: 24px;
            margin-top: 16px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .result.show { display: block; animation: pop 0.3s ease; }
        .result h2 { color: #4a7c59; margin-bottom: 8px; }
        .result .time { font-size: 2em; font-weight: 700; color: #3a5a3a; }
        .result .best { color: #6a8a6a; margin-top: 4px; }
        .result .new-record { color: #e67e22; font-weight: 700; }

        /* 按钮 */
        .btn {
            display: inline-block;
            padding: 10px 28px;
            background: #4a7c59;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
        }
        .btn:hover { background: #3a6a49; }

        /* 历史记录 */
        .history {
            margin-top: 20px;
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .history h3 {
            color: #3a5a3a;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history h3 button {
            font-size: 0.75em;
            padding: 4px 12px;
            background: #e8efe8;
            border: 1px solid #c8dcc8;
            border-radius: 12px;
            cursor: pointer;
            color: #6a8a6a;
        }
        .history h3 button:hover { background: #d0dcd0; }
        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f0f4f0;
            font-size: 0.9em;
            color: #4a6a4a;
        }
        .history-item:last-child { border-bottom: none; }
        .history-item .record-best { color: #e67e22; font-weight: 600; }
        .history-empty { color: #aaa; text-align: center; padding: 16px 0; font-size: 0.9em; }

        /* 防沉迷蒙层 */
        .anti-addiction-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .anti-addiction-overlay.show { display: flex; }
        .anti-addiction-box {
            background: #fff;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: pop 0.3s ease;
        }
        .anti-addiction-box .icon { font-size: 3em; margin-bottom: 12px; }
        .anti-addiction-box h2 { color: #3a5a3a; margin-bottom: 8px; }
        .anti-addiction-box p { color: #6a8a6a; line-height: 1.6; margin-bottom: 16px; }
        .anti-addiction-box .hint { font-size: 0.85em; color: #aaa; }

        @media (max-width: 480px) {
            header h1 { font-size: 1.4em; }
            .cell { font-size: 1.1em; border-radius: 6px; }
            .timer { font-size: 1.3em; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="../index.html">← 返回导航</a>
    </div>

    <div class="container">
        <header>
            <h1>👀 舒尔特方格</h1>
            <p>按顺序点击数字，训练你的专注力和视觉搜索能力</p>
        </header>

        <div class="controls">
            <button class="size-btn active" data-size="5" onclick="switchSize(5)">5×5</button>
            <button class="size-btn" data-size="6" onclick="switchSize(6)">6×6</button>
            <button class="size-btn" data-size="7" onclick="switchSize(7)">7×7</button>
        </div>

        <div class="status-bar">
            <div class="next-num">下一个: <span id="nextNum">1</span></div>
            <div class="timer" id="timer">0.00s</div>
        </div>

        <div class="grid-wrapper">
            <div class="grid" id="grid"></div>
        </div>

        <div class="result" id="result">
            <h2>🎉 完成！</h2>
            <div class="time" id="resultTime"></div>
            <div id="bestInfo"></div>
            <button class="btn" onclick="startGame()">再来一局</button>
        </div>

        <div class="history" id="historySection">
            <h3>
                📊 历史记录
                <button onclick="clearHistory()">清除</button>
            </h3>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <!-- 防沉迷蒙层 -->
    <div class="anti-addiction-overlay" id="antiAddiction">
        <div class="anti-addiction-box">
            <div class="icon">😊</div>
            <h2>该休息一下啦！</h2>
            <p>你已经玩了 30 分钟了，<br>让眼睛休息一会儿，看看远处的绿色吧～</p>
            <p class="hint">刷新页面可以继续游戏</p>
        </div>
    </div>

    <script>
        let gridSize = 5;
        let nextNumber = 1;
        let totalNumbers = 25;
        let timerInterval = null;
        let startTime = null;
        let gameActive = false;
        let gameStarted = false;

        // 防沉迷：30分钟计时
        const PAGE_OPEN_TIME = Date.now();
        const ANTI_ADDICTION_MS = 30 * 60 * 1000;
        setInterval(() => {
            if (Date.now() - PAGE_OPEN_TIME >= ANTI_ADDICTION_MS) {
                document.getElementById('antiAddiction').classList.add('show');
                if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
                gameActive = false;
            }
        }, 10000);

        function switchSize(size) {
            gridSize = size;
            totalNumbers = size * size;
            document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.size-btn[data-size="${size}"]`).classList.add('active');
            startGame();
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startGame() {
            nextNumber = 1;
            gameActive = true;
            gameStarted = false;
            startTime = null;
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
            document.getElementById('timer').textContent = '0.00s';
            document.getElementById('nextNum').textContent = '1';
            document.getElementById('result').classList.remove('show');

            const grid = document.getElementById('grid');
            const cellSize = Math.min(Math.floor((Math.min(window.innerWidth - 48, 560)) / gridSize), 72);
            grid.style.gridTemplateColumns = `repeat(${gridSize}, ${cellSize}px)`;
            grid.style.gridTemplateRows = `repeat(${gridSize}, ${cellSize}px)`;
            grid.innerHTML = '';

            const numbers = shuffle(Array.from({ length: totalNumbers }, (_, i) => i + 1));
            numbers.forEach(num => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.textContent = num;
                cell.dataset.num = num;
                cell.addEventListener('click', () => handleClick(cell, num));
                grid.appendChild(cell);
            });

            renderHistory();
        }

        function handleClick(cell, num) {
            if (!gameActive || cell.classList.contains('correct')) return;

            if (!gameStarted) {
                gameStarted = true;
                startTime = performance.now();
                timerInterval = setInterval(updateTimer, 50);
            }

            if (num === nextNumber) {
                cell.classList.add('correct');
                nextNumber++;
                document.getElementById('nextNum').textContent = nextNumber <= totalNumbers ? nextNumber : '✓';

                if (nextNumber > totalNumbers) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    gameActive = false;
                    const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);
                    showResult(elapsed);
                }
            } else {
                cell.classList.add('wrong');
                setTimeout(() => cell.classList.remove('wrong'), 300);
            }
        }

        function updateTimer() {
            if (!startTime) return;
            const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);
            document.getElementById('timer').textContent = elapsed + 's';
        }

        function showResult(time) {
            const key = `schulte_history_${gridSize}`;
            const history = JSON.parse(localStorage.getItem(key) || '[]');
            const best = history.length > 0 ? Math.min(...history.map(h => h.time)) : Infinity;
            const isNewRecord = parseFloat(time) < best;

            history.unshift({ time: parseFloat(time), date: new Date().toLocaleString('zh-CN') });
            if (history.length > 20) history.pop();
            localStorage.setItem(key, JSON.stringify(history));

            document.getElementById('resultTime').textContent = time + 's';
            const bestInfo = document.getElementById('bestInfo');
            if (isNewRecord) {
                bestInfo.innerHTML = '<div class="new-record">🏆 新纪录！</div>';
            } else {
                bestInfo.innerHTML = `<div class="best">最佳: ${Math.min(best, parseFloat(time)).toFixed(2)}s</div>`;
            }
            document.getElementById('result').classList.add('show');
            renderHistory();
        }

        function renderHistory() {
            const key = `schulte_history_${gridSize}`;
            const history = JSON.parse(localStorage.getItem(key) || '[]');
            const list = document.getElementById('historyList');

            if (history.length === 0) {
                list.innerHTML = '<div class="history-empty">暂无记录，开始挑战吧！</div>';
                return;
            }

            const best = Math.min(...history.map(h => h.time));
            list.innerHTML = history.map(h =>
                `<div class="history-item">
                    <span>${h.date}</span>
                    <span class="${h.time === best ? 'record-best' : ''}">${h.time.toFixed(2)}s${h.time === best ? ' 🏆' : ''}</span>
                </div>`
            ).join('');
        }

        function clearHistory() {
            if (!confirm('确定清除当前规格的历史记录？')) return;
            localStorage.removeItem(`schulte_history_${gridSize}`);
            renderHistory();
        }

        // 初始化
        startGame();
    </script>
</body>
</html>
