<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>逻辑判断题题库 - 对错判断训练</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            color: #fff;
            padding: 20px 0;
        }
        header h1 { font-size: 1.8em; margin-bottom: 6px; }
        header p { opacity: 0.85; font-size: 0.95em; }
        .back-link {
            display: inline-block;
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        .back-link:hover { color: #fff; }

        /* 控制面板 */
        .controls {
            background: #fff;
            border-radius: 16px;
            padding: 18px 20px;
            margin-bottom: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .controls label { font-weight: 600; font-size: 0.9em; color: #444; }
        .controls select, .controls button {
            padding: 8px 16px;
            border-radius: 8px;
            border: 2px solid #e0e0e0;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
        }
        .controls select:focus { border-color: #667eea; outline: none; }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none !important;
            font-weight: 600;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,126,234,0.4); }
        .btn-reset {
            background: #f5f5f5;
            color: #666;
        }
        .btn-reset:hover { background: #e8e8e8; }

        /* 进度条 */
        .progress-bar {
            background: #fff;
            border-radius: 16px;
            padding: 14px 20px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
        }
        .progress-track {
            height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.4s ease;
            width: 0%;
        }

        /* 题目卡片 */
        .question-card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }
        .question-card.correct { border-left: 5px solid #4caf50; }
        .question-card.wrong { border-left: 5px solid #f44336; }
        .question-card.unanswered { border-left: 5px solid transparent; }

        .q-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .q-number {
            font-size: 0.8em;
            color: #999;
            font-weight: 600;
        }
        .q-category {
            font-size: 0.75em;
            background: #f0f0f0;
            color: #666;
            padding: 3px 10px;
            border-radius: 12px;
        }
        .q-text {
            font-size: 1.05em;
            line-height: 1.6;
            color: #333;
            margin-bottom: 16px;
        }
        .q-options {
            display: flex;
            gap: 10px;
        }
        .q-options button {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: #fafafa;
        }
        .q-options button:hover:not(:disabled) {
            transform: translateY(-1px);
        }
        .btn-true { color: #4caf50; }
        .btn-true:hover:not(:disabled) { background: #e8f5e9; border-color: #4caf50; }
        .btn-false { color: #f44336; }
        .btn-false:hover:not(:disabled) { background: #fbe9e7; border-color: #f44336; }

        .btn-true.selected-correct { background: #4caf50; color: #fff; border-color: #4caf50; }
        .btn-true.selected-wrong { background: #f44336; color: #fff; border-color: #f44336; }
        .btn-false.selected-correct { background: #4caf50; color: #fff; border-color: #4caf50; }
        .btn-false.selected-wrong { background: #f44336; color: #fff; border-color: #f44336; }
        .btn-true.show-answer { background: #e8f5e9; border-color: #4caf50; }
        .btn-false.show-answer { background: #e8f5e9; border-color: #4caf50; }

        .q-options button:disabled { cursor: default; opacity: 0.7; }

        /* 解析 */
        .q-explanation {
            margin-top: 14px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.9em;
            line-height: 1.5;
            display: none;
        }
        .q-explanation.show { display: block; }
        .q-explanation.correct-bg { background: #e8f5e9; color: #2e7d32; }
        .q-explanation.wrong-bg { background: #fbe9e7; color: #c62828; }

        /* 结果面板 */
        .result-panel {
            background: #fff;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: none;
            margin-top: 16px;
        }
        .result-panel.show { display: block; }
        .result-emoji { font-size: 3em; margin-bottom: 10px; }
        .result-score { font-size: 2em; font-weight: 700; color: #333; }
        .result-detail { font-size: 0.95em; color: #666; margin-top: 8px; }
        .result-stars { font-size: 2em; margin: 12px 0; }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #fff;
        }
        .empty-state .icon { font-size: 3em; margin-bottom: 16px; }
        .empty-state p { font-size: 1.1em; opacity: 0.85; }

        @media (max-width: 500px) {
            header h1 { font-size: 1.4em; }
            .question-card { padding: 18px; }
            .controls { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../index.html" class="back-link">← 返回导航</a>
            <h1>✅ 逻辑判断题题库</h1>
            <p>对还是错？训练规则理解与逻辑判断能力</p>
        </header>

        <div class="controls">
            <label>分类：</label>
            <select id="categorySelect">
                <option value="all">全部</option>
                <option value="math">数学逻辑</option>
                <option value="life">生活常识</option>
                <option value="language">语言逻辑</option>
                <option value="science">科学知识</option>
                <option value="reasoning">推理判断</option>
            </select>
            <label>题数：</label>
            <select id="countSelect">
                <option value="5">5 题</option>
                <option value="10" selected>10 题</option>
                <option value="20">20 题</option>
                <option value="0">全部</option>
            </select>
            <button class="btn-primary" onclick="startQuiz()">🚀 开始答题</button>
            <button class="btn-reset" onclick="resetQuiz()">🔄 重置</button>
        </div>

        <div class="progress-bar" id="progressBar" style="display:none;">
            <div class="progress-info">
                <span id="progressText">第 0 / 0 题</span>
                <span id="progressScore">正确 0 | 错误 0</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <div id="questionsArea"></div>

        <div class="result-panel" id="resultPanel">
            <div class="result-emoji" id="resultEmoji"></div>
            <div class="result-score" id="resultScore"></div>
            <div class="result-stars" id="resultStars"></div>
            <div class="result-detail" id="resultDetail"></div>
            <br>
            <button class="btn-primary" onclick="startQuiz()" style="padding:12px 32px;border-radius:10px;font-size:1em;border:none;cursor:pointer;">再来一轮 🔁</button>
        </div>
    </div>

<script>
// ==================== 题库 ====================
const allQuestions = [
    // --- 数学逻辑 ---
    { q: "所有的偶数都能被2整除。", answer: true, category: "math", explain: "偶数的定义就是能被2整除的整数。" },
    { q: "0 既不是正数也不是负数。", answer: true, category: "math", explain: "0 是正数与负数的分界点，本身不属于正数也不属于负数。" },
    { q: "两个奇数相加的结果一定是奇数。", answer: false, category: "math", explain: "两个奇数相加结果是偶数，如 3+5=8。" },
    { q: "一个三角形的三个内角之和是 180°。", answer: true, category: "math", explain: "这是三角形内角和定理，平面三角形三个内角之和恒为180°。" },
    { q: "正方形是特殊的长方形。", answer: true, category: "math", explain: "正方形满足长方形的所有条件（四个直角），且四边相等，是长方形的特殊情况。" },
    { q: "1 是最小的质数。", answer: false, category: "math", explain: "1 既不是质数也不是合数，最小的质数是 2。" },
    { q: "圆的周长等于直径乘以π。", answer: true, category: "math", explain: "周长公式 C = πd = 2πr。" },
    { q: "任何数乘以 0 都等于 0。", answer: true, category: "math", explain: "0 乘以任何实数都等于 0，这是零的乘法性质。" },
    { q: "负数一定比正数小。", answer: true, category: "math", explain: "在数轴上，所有负数都在0的左边，所有正数都在0的右边，因此负数一定比正数小。" },
    { q: "平行四边形的对角线互相平分。", answer: true, category: "math", explain: "这是平行四边形的基本性质之一。" },
    { q: "两个负数相乘，结果是负数。", answer: false, category: "math", explain: "负负得正，两个负数相乘结果是正数。" },
    { q: "最小的两位数是 10。", answer: true, category: "math", explain: "两位数从 10 开始，到 99 结束。" },
    { q: "所有质数都是奇数。", answer: false, category: "math", explain: "2 是质数，也是唯一的偶数质数。" },
    { q: "一个数除以它本身，结果一定是 1。", answer: false, category: "math", explain: "0 除以 0 无意义，所以不能说'一定'是1，需排除0的情况。" },
    { q: "长方体有 6 个面、12 条棱、8 个顶点。", answer: true, category: "math", explain: "长方体的基本特征：6面12棱8顶点。" },

    // --- 生活常识 ---
    { q: "水的沸点在标准大气压下是 100°C。", answer: true, category: "life", explain: "在标准大气压（1atm）下，水的沸点确实是100°C。" },
    { q: "红灯停、绿灯行、黄灯亮了等一等。", answer: true, category: "life", explain: "这是基本的交通规则，保障行人和车辆安全。" },
    { q: "人体最大的器官是心脏。", answer: false, category: "life", explain: "人体最大的器官是皮肤，心脏是最重要的泵血器官。" },
    { q: "地球上的水大部分是淡水。", answer: false, category: "life", explain: "地球上约 97% 的水是海水（咸水），只有约 3% 是淡水。" },
    { q: "指南针的N极指向北方。", answer: true, category: "life", explain: "指南针N极（North）指向地理北极方向。" },
    { q: "夏天穿深色衣服比浅色衣服凉快。", answer: false, category: "life", explain: "深色衣服吸收更多热量，浅色衣服反射光线，所以浅色更凉快。" },
    { q: "一年有 365 天或 366 天。", answer: true, category: "life", explain: "平年365天，闰年366天（2月多1天）。" },
    { q: "感冒时应该多喝水、多休息。", answer: true, category: "life", explain: "多喝水帮助排毒，多休息有助于免疫系统恢复。" },
    { q: "电梯发生故障时应该立即扒门逃生。", answer: false, category: "life", explain: "正确做法是按紧急呼叫按钮等待救援，扒门非常危险。" },
    { q: "筷子是中国人发明的餐具。", answer: true, category: "life", explain: "筷子起源于中国，有三千多年的使用历史。" },
    { q: "牛奶可以空腹喝而不会不舒服。", answer: false, category: "life", explain: "空腹喝牛奶容易导致乳糖不耐受人群出现腹泻等不适。" },
    { q: "发生地震时应该躲在坚固的桌子下面。", answer: true, category: "life", explain: "地震时蹲在桌下可以防止被掉落的物品砸伤。" },

    // --- 语言逻辑 ---
    { q: ""一日之计在于晨"的意思是早晨是一天中最重要的时段。", answer: true, category: "language", explain: "这句谚语强调早晨的时间最宝贵，应好好利用。" },
    { q: ""亡羊补牢"的意思是羊丢了就不用管了。", answer: false, category: "language", explain: ""亡羊补牢，为时未晚"，意思是出了问题后及时补救还不算迟。" },
    { q: ""近朱者赤，近墨者黑"说的是环境对人的影响。", answer: true, category: "language", explain: "比喻跟什么样的人在一起，就会受到什么样的影响。" },
    { q: ""掩耳盗铃"比喻自己骗自己。", answer: true, category: "language", explain: "捂住自己的耳朵偷铃铛，以为别人也听不到，比喻自欺欺人。" },
    { q: ""守株待兔"这个成语是在夸奖一个人有耐心。", answer: false, category: "language", explain: "这个成语讽刺不思进取、心存侥幸、坐等意外收获的人。" },
    { q: ""画蛇添足"比喻做了多余的事反而不好。", answer: true, category: "language", explain: "蛇本没有脚，画上脚反而弄巧成拙。" },
    { q: ""拔苗助长"告诉我们做事要有耐心，不能急于求成。", answer: true, category: "language", explain: "急于求成反而会坏事，要顺应事物发展的规律。" },
    { q: ""塞翁失马"这个故事说明坏事不一定是真的坏事。", answer: true, category: "language", explain: "塞翁失马，焉知非福——事物可能向相反方向转化。" },
    { q: ""叶公好龙"说明叶公是一个真正喜欢龙的人。", answer: false, category: "language", explain: "叶公好龙讽刺口头上说喜欢，实际上并不真正喜欢的人。" },
    { q: ""刻舟求剑"讽刺的是不知变通、死守教条的人。", answer: true, category: "language", explain: "船已经走了，在原来的位置找剑是不可能找到的，讽刺墨守成规。" },
    { q: ""杯弓蛇影"形容一个人非常勇敢。", answer: false, category: "language", explain: "杯弓蛇影比喻疑神疑鬼、自相惊扰，并非形容勇敢。" },
    { q: ""对牛弹琴"比喻跟不懂道理的人讲道理，白费口舌。", answer: true, category: "language", explain: "牛听不懂音乐，比喻对象不对，说了也没用。" },

    // --- 科学知识 ---
    { q: "太阳是一颗恒星。", answer: true, category: "science", explain: "太阳是太阳系的中心恒星，依靠核聚变发光发热。" },
    { q: "声音在真空中也能传播。", answer: false, category: "science", explain: "声音需要介质（空气、水、固体）传播，真空中无法传播声音。" },
    { q: "地球绕太阳公转一圈大约是 365 天。", answer: true, category: "science", explain: "地球公转周期约为365.25天，因此每四年有一个闰年。" },
    { q: "月球本身能发光。", answer: false, category: "science", explain: "月球本身不发光，我们看到的月光是月球反射太阳光。" },
    { q: "植物通过光合作用吸收二氧化碳，释放氧气。", answer: true, category: "science", explain: "光合作用是植物利用光能将二氧化碳和水转化为有机物和氧气的过程。" },
    { q: "彩虹是由 7 种颜色组成的。", answer: true, category: "science", explain: "彩虹由红、橙、黄、绿、蓝、靛、紫七种颜色组成。" },
    { q: "恐龙和人类曾经生活在同一个时代。", answer: false, category: "science", explain: "恐龙在约6600万年前灭绝，而人类大约在几百万年前才出现。" },
    { q: "水蒸气遇冷会变成水滴，这叫液化。", answer: true, category: "science", explain: "气态变为液态的过程叫液化，如水蒸气遇冷凝结成水珠。" },
    { q: "地球是太阳系中最大的行星。", answer: false, category: "science", explain: "太阳系中最大的行星是木星，地球排在第五位。" },
    { q: "铁在潮湿环境下容易生锈。", answer: true, category: "science", explain: "铁与水和氧气反应会生成铁锈（氧化铁），潮湿加速这个过程。" },
    { q: "光的传播速度比声音快。", answer: true, category: "science", explain: "光速约3×10⁸m/s，声速约340m/s，光比声音快得多，所以先看到闪电再听到雷声。" },
    { q: "鲸鱼是鱼类。", answer: false, category: "science", explain: "鲸鱼是哺乳动物，用肺呼吸、胎生哺乳，不是鱼类。" },

    // --- 推理判断 ---
    { q: "如果所有的苹果都是水果，那么所有的水果都是苹果。", answer: false, category: "reasoning", explain: "苹果是水果的子集，但水果还包括很多其他种类，如香蕉、橙子等。" },
    { q: "如果下雨地面就会湿，现在地面湿了，说明一定下过雨。", answer: false, category: "reasoning", explain: "地面湿可能有其他原因，比如洒水车经过、有人浇花等，不一定是下雨。" },
    { q: "小明比小红高，小红比小刚高，所以小明比小刚高。", answer: true, category: "reasoning", explain: "身高具有传递性：小明 > 小红 > 小刚，所以小明 > 小刚。" },
    { q: "如果今天是星期一，那么明天一定是星期二。", answer: true, category: "reasoning", explain: "星期的顺序是固定的，星期一之后一定是星期二。" },
    { q: "小明说："我说的这句话是假的。" 这句话是真的。", answer: false, category: "reasoning", explain: "这是一个悖论——如果这句话是真的，那它说自己是假的；如果是假的，那它说的就是真的。它既不能为真也不能为假。" },
    { q: "所有的猫都是动物，小花是猫，所以小花是动物。", answer: true, category: "reasoning", explain: "这是标准的三段论推理：大前提+小前提→结论，逻辑完全正确。" },
    { q: "一个班级有30个学生，其中有15个男生，那么一定有15个女生。", answer: true, category: "reasoning", explain: "30 - 15 = 15，在只有男女两种性别的前提下，女生一定是15个。" },
    { q: "因为公鸡打鸣后太阳升起，所以太阳升起是公鸡打鸣造成的。", answer: false, category: "reasoning", explain: "先后发生不代表因果关系，太阳升起和公鸡打鸣是相关但无因果关系的事件。" },
    { q: "如果A>B，B>C，C>D，那么A>D。", answer: true, category: "reasoning", explain: "不等式具有传递性，A>B>C>D，所以A>D。" },
    { q: "小明有5块糖，给了小红2块，小明还剩2块。", answer: false, category: "reasoning", explain: "5 - 2 = 3，小明应该还剩3块糖，不是2块。" },
    { q: "今天不是周末，所以今天一定是工作日。", answer: false, category: "reasoning", explain: "虽然大部分情况下不是周末就是工作日，但如果遇到法定节假日调休，也可能不是工作日。" },
    { q: "三个人中，小明最高，小刚最矮，那么小红的身高在小明和小刚之间。", answer: true, category: "reasoning", explain: "只有三个人，最高和最矮确定后，剩下的那个一定在中间。" },
    { q: "如果所有鸟都会飞，企鹅是鸟，那么企鹅会飞。", answer: true, category: "reasoning", explain: "从逻辑推理来看，如果前提"所有鸟都会飞"成立，结论就成立。这里考察的是推理过程是否正确，而不是前提是否真实（事实上不是所有鸟都会飞）。" },
    { q: "小明每天都迟到，所以他明天也一定会迟到。", answer: false, category: "reasoning", explain: "过去一直迟到不代表未来一定迟到，这是归纳推理的局限性——无法保证100%确定。" },
];

// ==================== 状态 ====================
let currentQuestions = [];
let answered = 0;
let correctCount = 0;
let wrongCount = 0;

// ==================== 逻辑 ====================
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startQuiz() {
    const cat = document.getElementById('categorySelect').value;
    const count = parseInt(document.getElementById('countSelect').value);

    let pool = cat === 'all' ? [...allQuestions] : allQuestions.filter(q => q.category === cat);
    pool = shuffle(pool);
    if (count > 0) pool = pool.slice(0, count);

    currentQuestions = pool;
    answered = 0;
    correctCount = 0;
    wrongCount = 0;

    document.getElementById('resultPanel').classList.remove('show');
    document.getElementById('progressBar').style.display = 'block';
    updateProgress();
    renderQuestions();
}

function renderQuestions() {
    const area = document.getElementById('questionsArea');
    area.innerHTML = '';
    if (currentQuestions.length === 0) {
        area.innerHTML = '<div style="text-align:center;color:#fff;padding:40px;opacity:0.8;">该分类暂无题目，请换一个分类试试 😊</div>';
        return;
    }
    currentQuestions.forEach((q, i) => {
        const catNames = { math:'数学逻辑', life:'生活常识', language:'语言逻辑', science:'科学知识', reasoning:'推理判断' };
        area.innerHTML += `
            <div class="question-card unanswered" id="card-${i}">
                <div class="q-header">
                    <span class="q-number">第 ${i+1} 题</span>
                    <span class="q-category">${catNames[q.category] || q.category}</span>
                </div>
                <div class="q-text">${q.q}</div>
                <div class="q-options">
                    <button class="btn-true" id="btn-true-${i}" onclick="judge(${i}, true)">✅ 对</button>
                    <button class="btn-false" id="btn-false-${i}" onclick="judge(${i}, false)">❌ 错</button>
                </div>
                <div class="q-explanation" id="explain-${i}">💡 ${q.explain}</div>
            </div>
        `;
    });
}

function judge(idx, userAnswer) {
    const q = currentQuestions[idx];
    const card = document.getElementById(`card-${idx}`);
    const btnTrue = document.getElementById(`btn-true-${idx}`);
    const btnFalse = document.getElementById(`btn-false-${idx}`);
    const explainEl = document.getElementById(`explain-${idx}`);

    if (btnTrue.disabled) return; // 已答过

    const isCorrect = userAnswer === q.answer;

    if (isCorrect) {
        correctCount++;
        card.className = 'question-card correct';
        explainEl.className = 'q-explanation show correct-bg';
    } else {
        wrongCount++;
        card.className = 'question-card wrong';
        explainEl.className = 'q-explanation show wrong-bg';
    }

    // 标记选中按钮
    const clickedBtn = userAnswer ? btnTrue : btnFalse;
    clickedBtn.classList.add(isCorrect ? 'selected-correct' : 'selected-wrong');

    // 如果答错，高亮正确答案
    if (!isCorrect) {
        const correctBtn = q.answer ? btnTrue : btnFalse;
        correctBtn.classList.add('show-answer');
    }

    btnTrue.disabled = true;
    btnFalse.disabled = true;

    answered++;
    updateProgress();

    if (answered === currentQuestions.length) {
        setTimeout(showResult, 600);
    }
}

function updateProgress() {
    const total = currentQuestions.length;
    document.getElementById('progressText').textContent = `第 ${answered} / ${total} 题`;
    document.getElementById('progressScore').textContent = `正确 ${correctCount} | 错误 ${wrongCount}`;
    document.getElementById('progressFill').style.width = total > 0 ? (answered / total * 100) + '%' : '0%';
}

function showResult() {
    const total = currentQuestions.length;
    const pct = Math.round(correctCount / total * 100);
    let emoji, stars;
    if (pct === 100) { emoji = '🏆'; stars = '⭐⭐⭐⭐⭐'; }
    else if (pct >= 80) { emoji = '🎉'; stars = '⭐⭐⭐⭐'; }
    else if (pct >= 60) { emoji = '👍'; stars = '⭐⭐⭐'; }
    else if (pct >= 40) { emoji = '💪'; stars = '⭐⭐'; }
    else { emoji = '📚'; stars = '⭐'; }

    document.getElementById('resultEmoji').textContent = emoji;
    document.getElementById('resultScore').textContent = `${correctCount} / ${total}`;
    document.getElementById('resultStars').textContent = stars;
    document.getElementById('resultDetail').textContent = `正确率 ${pct}%，共 ${total} 题，答对 ${correctCount} 题，答错 ${wrongCount} 题`;
    document.getElementById('resultPanel').classList.add('show');
    document.getElementById('resultPanel').scrollIntoView({ behavior: 'smooth' });
}

function resetQuiz() {
    currentQuestions = [];
    answered = 0; correctCount = 0; wrongCount = 0;
    document.getElementById('questionsArea').innerHTML = '';
    document.getElementById('progressBar').style.display = 'none';
    document.getElementById('resultPanel').classList.remove('show');
}

// 初始加载
startQuiz();
</script>
