<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面 - 周广生</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }
        h1 { color: #333; margin-bottom: 20px; }
        p { color: #555; line-height: 1.8; margin-bottom: 15px; }
        .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="../index.html" class="back-link">← 返回导航中心</a>
        <h1>🧪 测试页面</h1>
        <p>这是通过 OpenClaw + GitHub Pages 部署的子页面。</p>
        <p>你可以在这里放置任何内容：项目介绍、作品集、博客文章等。</p>
        <p>后续添加新页面时，只需在 website/ 目录下创建新文件夹，然后更新导航页即可。</p>
        <span class="badge">状态: 正常运行 ✅</span>
    </div>
</body>
</html>
