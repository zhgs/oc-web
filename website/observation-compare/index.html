<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>观察对比训练器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .mode-select {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .mode-btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            color: #667eea;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .mode-btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        .mode-btn.active { background: #ffd700; color: #333; }
        .game-area { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .level-select { text-align: center; margin-bottom: 20px; }
        .level-btn {
            padding: 8px 20px;
            margin: 0 5px;
            border: 2px solid #667eea;
            border-radius: 20px;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-weight: bold;
        }
        .level-btn.active { background: #667eea; color: white; }
        .compare-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .compare-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            border: 3px solid #ddd;
        }
        .compare-box h3 { text-align: center; margin-bottom: 10px; color: #333; }
        .grid {
            display: grid;
            gap: 5px;
            cursor: pointer;
        }
        .grid.easy { grid-template-columns: repeat(4, 60px); }
        .grid.medium { grid-template-columns: repeat(5, 50px); }
        .grid.hard { grid-template-columns: repeat(6, 45px); }
        .cell {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            transition: transform 0.2s;
        }
        .cell:hover { transform: scale(1.1); }
        .cell.marked { outline: 4px solid #ff6b6b; animation: shake 0.5s; }
        .cell.found { background: #90EE90 !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .score-board {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            color: white;
        }
        .score-board h2 { margin-bottom: 10px; }
        .stats { display: flex; justify-content: center; gap: 30px; font-size: 18px; }
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            background: #ffd700;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .message {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            font-weight: bold;
        }
        .message.success { background: #d4edda; color: #155724; }
        .message.error { background: #f8d7da; color: #721c24; }
        .same-mode .compare-container { gap: 40px; }
        .same-mode .grid { gap: 8px; }
        .cell.selected { outline: 4px solid #667eea; transform: scale(1.1); }
        .cell.matched { background: #90EE90 !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 观察对比训练器</h1>
        
        <div class="mode-select">
            <button class="mode-btn active" onclick="setMode('diff')">找不同</button>
            <button class="mode-btn" onclick="setMode('same')">找相同</button>
        </div>
        
        <div class="game-area" id="gameArea">
            <div class="level-select" id="levelSelect">
                <button class="level-btn active" onclick="setLevel('easy')">简单</button>
                <button class="level-btn" onclick="setLevel('medium')">中等</button>
                <button class="level-btn" onclick="setLevel('hard')">困难</button>
            </div>
            
            <div id="message"></div>
            
            <div class="compare-container" id="compareContainer"></div>
            
            <div class="score-board">
                <h2>🎯 训练成绩</h2>
                <div class="stats">
                    <span>已发现: <strong id="found">0</strong> / <strong id="total">0</strong></span>
                    <span>错误点击: <strong id="errors">0</strong></span>
                    <span>用时: <strong id="time">0</strong>秒</span>
                </div>
                <button class="btn" onclick="startGame()">🔄 重新开始</button>
            </div>
        </div>
    </div>
    
    <script>
        const shapes = ['●', '■', '▲', '◆', '★', '♠', '♣', '♥', '♦', '○', '□', '△'];
        const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8', '#F7DC6F'];
        
        let currentMode = 'diff';
        let currentLevel = 'easy';
        let diffPositions = [];
        let foundCount = 0;
        let errorCount = 0;
        let startTime = 0;
        let timerInterval = null;
        let selectedSame = [];
        
        const config = { easy: { rows: 4, diffs: 3 }, medium: { rows: 5, diffs: 4 }, hard: { rows: 6, diffs: 5 } };
        
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === (mode === 'diff' ? 0 : 1));
            });
            document.getElementById('gameArea').classList.toggle('same-mode', mode === 'same');
            startGame();
        }
        
        function setLevel(level) {
            currentLevel = level;
            document.querySelectorAll('.level-btn').forEach((btn, i) => {
                const levels = ['easy', 'medium', 'hard'];
                btn.classList.toggle('active', levels[i] === level);
            });
            startGame();
        }
        
        function startGame() {
            const cfg = config[currentLevel];
            diffPositions = [];
            foundCount = 0;
            errorCount = 0;
            selectedSame = [];
            clearInterval(timerInterval);
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            
            document.getElementById('found').textContent = '0';
            document.getElementById('errors').textContent = '0';
            document.getElementById('time').textContent = '0';
            document.getElementById('total').textContent = currentMode === 'diff' ? cfg.diffs : cfg.diffs;
            
            const container = document.getElementById('compareContainer');
            container.innerHTML = '';
            
            if (currentMode === 'diff') {
                generateDiffGame(cfg);
            } else {
                generateSameGame(cfg);
            }
        }
        
        function generateDiffGame(cfg) {
            const { rows, diffs } = cfg;
            const total = rows * rows;
            const leftGrid = [], rightGrid = [];
            
            for (let i = 0; i < total; i++) {
                const shape = shapes[Math.floor(Math.random() * shapes.length)];
                const color = colors[Math.floor(Math.random() * colors.length)];
                leftGrid.push({ shape, color, id: i });
                rightGrid.push({ shape, color, id: i });
            }
            
            const diffIndices = [];
            while (diffIndices.length < diffs) {
                const idx = Math.floor(Math.random() * total);
                if (!diffIndices.includes(idx)) diffIndices.push(idx);
            }
            diffPositions = diffIndices;
            
            diffIndices.forEach(idx => {
                const newShape = shapes[Math.floor(Math.random() * shapes.length)];
                const newColor = colors[Math.floor(Math.random() * colors.length)];
                rightGrid[idx] = { shape: newShape, color: newColor, id: idx, isDiff: true };
            });
            
            const leftBox = createGridBox('左图', leftGrid, rows, false);
            const rightBox = createGridBox('右图', rightGrid, rows, true);
            document.getElementById('compareContainer').appendChild(leftBox, rightBox);
        }
        
        function generateSameGame(cfg) {
            const { rows, diffs } = cfg;
            const total = rows * rows;
            const targetCount = Math.min(diffs + 2, 8);
            const targetIndices = [];
            
            while (targetIndices.length < targetCount) {
                const idx = Math.floor(Math.random() * total);
                if (!targetIndices.includes(idx)) targetIndices.push(idx);
            }
            
            const targetItems = targetIndices.map(i => ({
                shape: shapes[Math.floor(Math.random() * shapes.length)],
                color: colors[Math.floor(Math.random() * colors.length)]
            }));
            
            const grid = [];
            const answerPositions = [];
            
            for (let i = 0; i < total; i++) {
                const targetIdx = Math.floor(Math.random() * targetItems.length);
                grid.push({ ...targetItems[targetIdx], id: i, isTarget: targetIdx < diffs });
                if (targetIdx < diffs) answerPositions.push(i);
            }
            
            diffPositions = answerPositions;
            
            const box = createSameGridBox('找出相同的图案', grid, rows);
            document.getElementById('compareContainer').appendChild(box);
            
            const targetDisplay = document.createElement('div');
            targetDisplay.style.cssText = 'text-align:center;margin-top:20px;';
            targetDisplay.innerHTML = '<h3>目标图案: </h3><div style="display:flex;justify-content:center;gap:15px;margin-top:10px;">';
            for (let i = 0; i < diffs; i++) {
                const item = targetItems[i];
                targetDisplay.innerHTML += `<div style="font-size:40px;color:${item.color}">${item.shape}</div>`;
            }
            targetDisplay.innerHTML += '</div>';
            document.getElementById('compareContainer').appendChild(targetDisplay);
        }
        
        function createGridBox(title, gridData, rows, isRight) {
            const box = document.createElement('div');
            box.className = 'compare-box';
            box.innerHTML = `<h3>${title}</h3>`;
            
            const grid = document.createElement('div');
            grid.className = `grid ${currentLevel}`;
            grid.style.gridTemplateColumns = `repeat(${rows}, 1fr)`;
            
            gridData.forEach((item, idx) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.backgroundColor = item.color;
                cell.textContent = item.shape;
                cell.dataset.id = idx;
                cell.dataset.isDiff = item.isDiff || false;
                
                if (isRight) {
                    cell.onclick = () => handleCellClick(cell, idx, item.isDiff);
                }
                
                grid.appendChild(cell);
            });
            
            box.appendChild(grid);
            return box;
        }
        
        function createSameGridBox(title, gridData, rows) {
            const box = document.createElement('div');
            box.className = 'compare-box';
            box.innerHTML = `<h3>${title}</h3>`;
            
            const grid = document.createElement('div');
            grid.className = `grid ${currentLevel}`;
            grid.style.gridTemplateColumns = `repeat(${rows}, 1fr)`;
            
            gridData.forEach((item, idx) => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.style.backgroundColor = item.color;
                cell.textContent = item.shape;
                cell.dataset.id = idx;
                cell.dataset.isTarget = item.isTarget;
                
                cell.onclick = () => handleSameClick(cell, idx, item.isTarget);
                
                grid.appendChild(cell);
            });
            
            box.appendChild(grid);
            return box;
        }
        
        function handleCellClick(cell, idx, isDiff) {
            if (cell.classList.contains('found')) return;
            
            if (isDiff) {
                cell.classList.add('found');
                showMessage('✅ 找到一处不同！', 'success');
                foundCount++;
                document.getElementById('found').textContent = foundCount;
                
                if (foundCount === diffPositions.length) {
                    clearInterval(timerInterval);
                    showMessage('🎉 恭喜！你找出了所有不同！', 'success');
                }
            } else {
                cell.classList.add('marked');
                errorCount++;
                document.getElementById('errors').textContent = errorCount;
                showMessage('❌ 这里没有不同，再仔细看看', 'error');
                setTimeout(() => cell.classList.remove('marked'), 500);
            }
        }
        
        function handleSameClick(cell, idx, isTarget) {
            if (cell.classList.contains('matched') || cell.classList.contains('selected')) return;
            
            if (isTarget) {
                cell.classList.add('matched');
                showMessage('✅ 找对了！', 'success');
                foundCount++;
                document.getElementById('found').textContent = foundCount;
                
                if (foundCount === diffPositions.length) {
                    clearInterval(timerInterval);
                    showMessage('🎉 恭喜！你找出了所有相同的图案！', 'success');
                }
            } else {
                cell.classList.add('selected');
                errorCount++;
                document.getElementById('errors').textContent = errorCount;
                showMessage('❌ 这个不是目标图案', 'error');
                setTimeout(() => cell.classList.remove('selected'), 500);
            }
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = `message ${type}`;
            setTimeout(() => msg.textContent = '', 2000);
        }
        
        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            document.getElementById('time').textContent = elapsed;
        }
        
        startGame();
    </script>
</body>
</html>
